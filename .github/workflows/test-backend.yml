name: Test Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'img/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/**'
      - '!.github/workflows/test-backend.yml'
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'img/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/**'
      - '!.github/workflows/test-backend.yml'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.26"
      - name: Run tests
        run: uv run bash scripts/test.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
        env:
          PROJECT_NAME: "Full Stack Template"
          POSTGRES_SERVER: "localhost"
          POSTGRES_USER: "postgres"
          FIRST_SUPERUSER: "admin@example.com"
          FIRST_SUPERUSER_PASSWORD: "testpassword"
          EMAILS_FROM_EMAIL: "test@example.com"
      - name: Store coverage files
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=80
        working-directory: backend
