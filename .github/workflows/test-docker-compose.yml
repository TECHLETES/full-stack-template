name: Test Docker Compose

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'img/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/**'
      - '!.github/workflows/test-docker-compose.yml'
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'img/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create .env file for CI
        run: |
          cp .env.template .env
          # Override for Docker networking
          sed -i 's/^POSTGRES_SERVER=.*/POSTGRES_SERVER=db/' .env
          sed -i 's/^REDIS_URL=.*/REDIS_URL=redis:\/\/redis:6379/' .env
      - run: docker compose build
      - run: docker compose down -v --remove-orphans
      - name: Show environment and versions
        run: |
          echo "=== Docker Versions ==="
          docker --version
          docker compose --version
          echo "=== .env file ==="
          cat .env
          echo "=== Current directory ==="
          pwd
          ls -la
      - name: Start services with debugging
        run: docker compose up -d --wait backend adminer
        timeout-minutes: 5
      - name: Check Docker Compose status
        if: failure()
        run: |
          echo "=== Docker Compose PS ==="
          docker compose ps -a
          echo "=== Redis logs ==="
          docker compose logs redis || true
          echo "=== Database logs ==="
          docker compose logs db || true
          echo "=== Backend logs ==="
          docker compose logs backend || true
      - name: Test backend is up
        run: docker compose exec backend curl -f http://localhost:8000/api/v1/utils/health-check
      - name: Test frontend is served from backend
        run: docker compose exec backend curl -f http://localhost:8000
      - run: docker compose down -v --remove-orphans
