name: Test Docker Compose

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'img/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'img/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "test-secret-key-for-ci"
      DOCKER_IMAGE_BACKEND: "backend"
      TAG: "latest"
      POSTGRES_PASSWORD: "testdb"
      POSTGRES_USER: "testuser"
      POSTGRES_DB: "testdb"
      POSTGRES_PORT: "5432"
      FRONTEND_HOST: "http://localhost"
      DOMAIN: "localhost"
      ENVIRONMENT: "local"
      FIRST_SUPERUSER: "admin@example.com"
      FIRST_SUPERUSER_PASSWORD: "testpassword"
      EMAILS_FROM_EMAIL: "test@example.com"
      BACKEND_CORS_ORIGINS: "http://localhost"
      SMTP_HOST: ""
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci
          POSTGRES_PASSWORD=testdb
          POSTGRES_USER=testuser
          POSTGRES_DB=testdb
          POSTGRES_PORT=5432
          EOF
      - run: docker compose build
      - run: docker compose down -v --remove-orphans
      - name: Show environment and versions
        run: |
          echo "=== Docker Versions ==="
          docker --version
          docker compose --version
          echo "=== .env file ==="
          cat .env
          echo "=== Current directory ==="
          pwd
          ls -la
      - name: Start services with debugging
        run: docker compose up -d --wait backend adminer
        timeout-minutes: 5
      - name: Check Docker Compose status
        if: failure()
        run: |
          echo "=== Docker Compose PS ==="
          docker compose ps -a
          echo "=== Redis logs ==="
          docker compose logs redis || true
          echo "=== Database logs ==="
          docker compose logs db || true
          echo "=== Backend logs ==="
          docker compose logs backend || true
      - name: Test backend is up
        run: docker compose exec backend curl -f http://localhost:8000/api/v1/utils/health-check
      - name: Test frontend is served from backend
        run: docker compose exec backend curl -f http://localhost:8000
      - run: docker compose down -v --remove-orphans
