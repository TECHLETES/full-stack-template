# .github/workflows/ci.yml

name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      PRE_COMMIT_HOME: ${{ github.workspace }}/.pre-commit-cache
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pre-commit-cache
          key: pre-commit-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run bash scripts/test.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
      - name: Store coverage files
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true

      - name: Generate coverage badge
        run: uv run genbadge coverage -i backend/coverage.xml -o coverage.svg

      - name: Commit badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: coverage.svg
          branch: ${{ github.head_ref }}
